basePath: /
definitions:
  api.AddProcessesToBundleRequest:
    properties:
      processes:
        description: Process IDs to add — each is either the 24-hex ProcessID or the
          64-hex on-chain election id.
        items:
          type: string
        type: array
    type: object
  api.InfoResponse:
    properties:
      chainId:
        type: string
      goVersion:
        type: string
      version:
        type: string
    type: object
  apicommon.APIKeyInfo:
    properties:
      createdAt:
        type: string
      createdBy:
        type: string
      expiresAt:
        type: string
      id:
        type: string
      label:
        type: string
      lastUsedAt:
        type: string
      prefix:
        type: string
      revoked:
        type: boolean
      scopes:
        items:
          type: string
        type: array
    type: object
  apicommon.AcceptOrganizationInvitation:
    properties:
      code:
        description: Invitation code
        type: string
      user:
        allOf:
        - $ref: '#/definitions/apicommon.UserInfo'
        description: User information for registration or identification
    type: object
  apicommon.AddCensusParticipantsRequest:
    properties:
      memberIds:
        description: List of existing organization member IDs to add to the census
        items:
          type: string
        type: array
    type: object
  apicommon.AddMembersJobResponse:
    properties:
      added:
        description: Number of members added
        type: integer
      errors:
        description: Errors encountered during job
        items:
          type: string
        type: array
      progress:
        description: Progress equals Added / Total * 100
        type: integer
      total:
        description: Total members in this job
        type: integer
    type: object
  apicommon.AddMembersRequest:
    properties:
      members:
        description: List of members to add
        items:
          $ref: '#/definitions/apicommon.OrgMember'
        type: array
    type: object
  apicommon.AddMembersResponse:
    properties:
      added:
        description: Number of members added
        type: integer
      errors:
        description: Errors encountered during job
        items:
          type: string
        type: array
      jobId:
        description: Job ID for tracking the addition process
        example: deadbeef
        format: hex
        type: string
    type: object
  apicommon.CensusParticipantsResponse:
    properties:
      censusId:
        description: Unique identifier for the census
        type: string
      memberIds:
        description: List of member IDs of the participants
        items:
          type: string
        type: array
    type: object
  apicommon.CensusSpec:
    properties:
      authFields:
        items:
          $ref: '#/definitions/db.OrgMemberAuthField'
        type: array
      groupId:
        type: string
      memberIds:
        items:
          type: string
        type: array
      twoFaFields:
        items:
          $ref: '#/definitions/db.OrgMemberTwoFaField'
        type: array
      weighted:
        type: boolean
    type: object
  apicommon.CheckBundleParticipantsRequest:
    properties:
      fieldName:
        type: string
      processID:
        example: deadbeef
        format: hex
        type: string
      value:
        type: string
    type: object
  apicommon.CheckBundleParticipantsResponse:
    properties:
      participants:
        items:
          $ref: '#/definitions/apicommon.CheckBundleParticipantsResponseEntry'
        type: array
    type: object
  apicommon.CheckBundleParticipantsResponseEntry:
    properties:
      email:
        type: string
      hasVoted:
        type: boolean
      memberId:
        type: string
      memberNumber:
        type: string
      name:
        type: string
      surname:
        type: string
    type: object
  apicommon.CreateAPIKeyRequest:
    properties:
      expiresAt:
        description: Optional expiration; when set, the key stops working after this
          time.
        type: string
      label:
        description: Human-readable label to identify the key.
        type: string
      scopes:
        description: Scopes the key is allowed to use (must be a subset of the assignable
          scopes).
        items:
          type: string
        type: array
    type: object
  apicommon.CreateAPIKeyResponse:
    properties:
      createdAt:
        type: string
      createdBy:
        type: string
      expiresAt:
        type: string
      id:
        type: string
      label:
        type: string
      lastUsedAt:
        type: string
      prefix:
        type: string
      revoked:
        type: boolean
      scopes:
        items:
          type: string
        type: array
      secret:
        description: Secret is the full API key, shown only at creation time.
        type: string
    type: object
  apicommon.CreateCensusRequest:
    properties:
      authFields:
        description: Optional for defining which member data should be used for authentication
        items:
          $ref: '#/definitions/db.OrgMemberAuthField'
        type: array
      orgAddress:
        description: Organization address
        items:
          type: integer
        type: array
      twoFaFields:
        description: Optional for defining which member data should be used for two-factor
          authentication
        items:
          $ref: '#/definitions/db.OrgMemberTwoFaField'
        type: array
    type: object
  apicommon.CreateCensusResponse:
    properties:
      id:
        description: Unique identifier for the census
        type: string
    type: object
  apicommon.CreateManagedOrganizationRequest:
    properties:
      active:
        description: Whether the organization is active
        type: boolean
      address:
        description: The organization's blockchain address
        items:
          type: integer
        type: array
      color:
        description: The organization's brand color in hex format
        type: string
      communications:
        description: Whether the organization has enabled communications
        type: boolean
      counters:
        allOf:
        - $ref: '#/definitions/apicommon.SubscriptionUsage'
        description: Usage counters for the organization
      country:
        description: The country where the organization is based
        type: string
      createdAt:
        description: Creation timestamp in RFC3339 format
        type: string
      description:
        allOf:
        - $ref: '#/definitions/apicommon.MultilingualText'
        description: Description is a shorthand for meta["description"]. Same encoding
          rules as Name.
      integrator:
        description: |-
          Whether to subscribe the new organization to the free integrator plan at
          creation time (opt-in). Used by the integrator portal so a newly created org
          becomes an integrator on the free tier with no checkout. Default false uses
          the regular default plan.
        type: boolean
      logo:
        allOf:
        - $ref: '#/definitions/apicommon.MultilingualText'
        description: Logo is a shorthand for meta["logo"]. Same encoding rules as
          Name.
      managedBy:
        description: |-
          Integrator organization that manages this org, when it was created through
          the integrator portal. Nil for regular organizations. Lets clients tell
          managed orgs apart from the user's own orgs (e.g. to hide them from the org
          switcher), a distinction Parent does not capture (managed orgs set ManagedBy,
          not Parent).

          A pointer so it is omitted rather than emitted as the zero address: json's
          omitempty does not skip the fixed-size common.Address array.
        example: deadbeef
        format: hex
        type: string
      meta:
        additionalProperties: {}
        description: Arbitrary key value fields with metadata regarding the organization
        type: object
      name:
        allOf:
        - $ref: '#/definitions/apicommon.MultilingualText'
        description: |-
          Name is a shorthand for meta["name"]. On write accepts a plain string
          (stored as {"default": "<string>"}) or a locale map; on read it mirrors
          whatever is stored in meta["name"]. If both Name and meta["name"] are
          provided on a create request, meta["name"] takes precedence.
      ownerEmail:
        description: OwnerEmail optionally assigns an existing user as the managed
          org's creator/admin.
        type: string
      parent:
        allOf:
        - $ref: '#/definitions/apicommon.OrganizationInfo'
        description: Parent organization if this is a sub-organization
      size:
        description: The size category of the organization
        type: string
      subdomain:
        description: The organization's subdomain
        type: string
      subscription:
        allOf:
        - $ref: '#/definitions/apicommon.SubscriptionDetails'
        description: Subscription details for the organization
      timezone:
        description: The organization's timezone
        type: string
      type:
        description: The type of organization
        type: string
      website:
        description: The organization's website URL
        type: string
    type: object
  apicommon.CreateOrganizationMemberGroupRequest:
    properties:
      description:
        description: Description of the group
        type: string
      includeAllMembers:
        description: Include all members of the organization in the group
        type: boolean
      memberIds:
        description: The IDs of the members to add to the group (optional if IncludeAllMembers
          is true)
        items:
          type: string
        type: array
      title:
        description: Title of the group
        type: string
    type: object
  apicommon.CreateOrganizationRequest:
    properties:
      active:
        description: Whether the organization is active
        type: boolean
      address:
        description: The organization's blockchain address
        items:
          type: integer
        type: array
      color:
        description: The organization's brand color in hex format
        type: string
      communications:
        description: Whether the organization has enabled communications
        type: boolean
      counters:
        allOf:
        - $ref: '#/definitions/apicommon.SubscriptionUsage'
        description: Usage counters for the organization
      country:
        description: The country where the organization is based
        type: string
      createdAt:
        description: Creation timestamp in RFC3339 format
        type: string
      description:
        allOf:
        - $ref: '#/definitions/apicommon.MultilingualText'
        description: Description is a shorthand for meta["description"]. Same encoding
          rules as Name.
      integrator:
        description: |-
          Whether to subscribe the new organization to the free integrator plan at
          creation time (opt-in). Used by the integrator portal so a newly created org
          becomes an integrator on the free tier with no checkout. Default false uses
          the regular default plan.
        type: boolean
      logo:
        allOf:
        - $ref: '#/definitions/apicommon.MultilingualText'
        description: Logo is a shorthand for meta["logo"]. Same encoding rules as
          Name.
      managedBy:
        description: |-
          Integrator organization that manages this org, when it was created through
          the integrator portal. Nil for regular organizations. Lets clients tell
          managed orgs apart from the user's own orgs (e.g. to hide them from the org
          switcher), a distinction Parent does not capture (managed orgs set ManagedBy,
          not Parent).

          A pointer so it is omitted rather than emitted as the zero address: json's
          omitempty does not skip the fixed-size common.Address array.
        example: deadbeef
        format: hex
        type: string
      meta:
        additionalProperties: {}
        description: Arbitrary key value fields with metadata regarding the organization
        type: object
      name:
        allOf:
        - $ref: '#/definitions/apicommon.MultilingualText'
        description: |-
          Name is a shorthand for meta["name"]. On write accepts a plain string
          (stored as {"default": "<string>"}) or a locale map; on read it mirrors
          whatever is stored in meta["name"]. If both Name and meta["name"] are
          provided on a create request, meta["name"] takes precedence.
      parent:
        allOf:
        - $ref: '#/definitions/apicommon.OrganizationInfo'
        description: Parent organization if this is a sub-organization
      provisionAccount:
        description: |-
          Whether to provision the organization's on-chain account at creation
          time (opt-in, eager). Default false preserves the legacy two-step flow
          where the account is created later by the SDK.
        type: boolean
      size:
        description: The size category of the organization
        type: string
      subdomain:
        description: The organization's subdomain
        type: string
      subscription:
        allOf:
        - $ref: '#/definitions/apicommon.SubscriptionDetails'
        description: Subscription details for the organization
      timezone:
        description: The organization's timezone
        type: string
      type:
        description: The type of organization
        type: string
      website:
        description: The organization's website URL
        type: string
    type: object
  apicommon.CreateOrganizationTicketRequest:
    properties:
      description:
        description: Body of the ticket
        type: string
      title:
        description: Title of the ticket
        type: string
      type:
        description: Type of the ticket to create (definded externally)
        type: string
    type: object
  apicommon.CreateProcessBundleRequest:
    properties:
      censusId:
        description: Census ID
        type: string
      processes:
        description: |-
          List of processes to include in the bundle. Each entry is either the 24-hex ProcessID or the
          64-hex on-chain election id.
        items:
          type: string
        type: array
    type: object
  apicommon.CreateProcessBundleResponse:
    properties:
      root:
        description: Merkle root of the process bundle
        example: deadbeef
        format: hex
        type: string
      uri:
        description: URI of the created process bundle
        type: string
    type: object
  apicommon.CreateProcessRequest:
    properties:
      address:
        description: Vochain ID/Address of the process
        example: deadbeef
        format: hex
        type: string
      censusId:
        description: Census ID
        example: deadbeef
        format: hex
        type: string
      electionParams:
        allOf:
        - $ref: '#/definitions/db.ElectionParams'
        description: Optional high-level election parameters (used later at publish
          time)
      metadata:
        additionalProperties: {}
        description: |-
          Additional metadata for the process
          Can be any key-value pairs
        type: object
      orgAddress:
        description: Organization address
        items:
          type: integer
        type: array
    type: object
  apicommon.CreateVotingProcessRequest:
    properties:
      census:
        $ref: '#/definitions/apicommon.CensusSpec'
      description:
        $ref: '#/definitions/db.MultiLangString'
      endDate:
        type: string
      header:
        type: string
      orgAddress:
        example: deadbeef
        format: hex
        type: string
      questions:
        items:
          $ref: '#/definitions/apicommon.VotingProcessQuestionRequest'
        type: array
      startDate:
        type: string
      streamUri:
        type: string
      title:
        $ref: '#/definitions/db.MultiLangString'
    type: object
  apicommon.CreateVotingProcessResponse:
    properties:
      processId:
        type: string
    type: object
  apicommon.DeleteManagedOrganizationResponse:
    properties:
      address:
        type: string
    type: object
  apicommon.DeleteMembersRequest:
    properties:
      all:
        description: Delete all members of the organization
        type: boolean
      ids:
        description: List of member internal ids numbers to delete (optional if All
          is true)
        items:
          type: string
        type: array
    type: object
  apicommon.DeleteMembersResponse:
    properties:
      count:
        description: Number of members deleted
        type: integer
    type: object
  apicommon.EligibilitySpec:
    properties:
      groupId:
        type: string
      memberIds:
        items:
          type: string
        type: array
    type: object
  apicommon.EnqueuedResponse:
    properties:
      jobId:
        description: Opaque job id; poll GET /jobs/{jobId} for the outcome
        example: a1b2c3
        type: string
    type: object
  apicommon.IntegratorInfoResponse:
    properties:
      enabled:
        type: boolean
      limits:
        $ref: '#/definitions/apicommon.IntegratorLimits'
      usage:
        $ref: '#/definitions/apicommon.IntegratorUsage'
    type: object
  apicommon.IntegratorLimits:
    properties:
      maxEmails:
        type: integer
      maxManagedOrgs:
        type: integer
      maxManagedProcesses:
        type: integer
      maxSMS:
        type: integer
      maxVotes:
        type: integer
    type: object
  apicommon.IntegratorUsage:
    properties:
      managedOrgs:
        type: integer
      managedProcesses:
        type: integer
      sentEmails:
        type: integer
      sentSMS:
        type: integer
      sentVotes:
        type: integer
    type: object
  apicommon.JobInfo:
    properties:
      added:
        description: Items successfully processed
        type: integer
      completed:
        description: Whether the job is completed
        type: boolean
      completedAt:
        description: Job completion timestamp (zero if not completed)
        type: string
      createdAt:
        description: Job creation timestamp
        type: string
      errors:
        description: List of errors encountered
        items:
          type: string
        type: array
      jobId:
        description: Unique job identifier
        type: string
      total:
        description: Total items to process
        type: integer
      type:
        allOf:
        - $ref: '#/definitions/db.JobType'
        description: Type of job
    type: object
  apicommon.JobStatusResponse:
    properties:
      error:
        type: string
      jobId:
        type: string
      result:
        $ref: '#/definitions/db.JobResult'
      status:
        $ref: '#/definitions/db.JobStatus'
      type:
        $ref: '#/definitions/db.JobType'
    type: object
  apicommon.JobsResponse:
    properties:
      jobs:
        description: List of jobs
        items:
          $ref: '#/definitions/apicommon.JobInfo'
        type: array
      pagination:
        allOf:
        - $ref: '#/definitions/apicommon.Pagination'
        description: Pagination fields
    type: object
  apicommon.ListAPIKeysResponse:
    properties:
      apiKeys:
        items:
          $ref: '#/definitions/apicommon.APIKeyInfo'
        type: array
    type: object
  apicommon.ListManagedOrganizations:
    properties:
      organizations:
        items:
          $ref: '#/definitions/apicommon.OrganizationInfo'
        type: array
      pagination:
        $ref: '#/definitions/apicommon.Pagination'
    type: object
  apicommon.ListOrganizationBundles:
    properties:
      bundles:
        description: List of organization bundles
        items:
          $ref: '#/definitions/apicommon.OrganizationBundle'
        type: array
      pagination:
        allOf:
        - $ref: '#/definitions/apicommon.Pagination'
        description: Pagination fields
    type: object
  apicommon.ListOrganizationMemberGroupResponse:
    properties:
      members:
        description: List of organization group members
        items:
          $ref: '#/definitions/apicommon.OrgMember'
        type: array
      pagination:
        allOf:
        - $ref: '#/definitions/apicommon.Pagination'
        description: Pagination fields
    type: object
  apicommon.ListOrganizationProcesses:
    properties:
      pagination:
        allOf:
        - $ref: '#/definitions/apicommon.Pagination'
        description: Pagination fields
      processes:
        description: List of organization processes
        items:
          $ref: '#/definitions/db.Process'
        type: array
    type: object
  apicommon.LoginResponse:
    properties:
      expirity:
        description: Token expiration time
        type: string
      token:
        description: JWT authentication token
        type: string
    type: object
  apicommon.MessageSignature:
    properties:
      address:
        description: Blockchain address
        example: deadbeef
        format: hex
        type: string
      payload:
        description: Message payload bytes
        example: aGVsbG8gd29ybGQ=
        format: base64
        type: string
      signature:
        description: Cryptographic signature
        example: deadbeef
        format: hex
        type: string
    type: object
  apicommon.MultilingualText:
    additionalProperties:
      type: string
    type: object
  apicommon.OAuthLinkRequest:
    properties:
      address:
        description: The address of the user
        type: string
      oauthSignature:
        description: The signature made by the OAuth service on top of the user email
        type: string
      provider:
        description: OAuth provider name (google, github, facebook)
        type: string
      userOAuthSignature:
        description: The signature made by the user on top of the oauth signature
        type: string
    type: object
  apicommon.OAuthLoginRequest:
    properties:
      address:
        description: The address of the user
        type: string
      email:
        description: User email address
        type: string
      firstName:
        description: User first name
        type: string
      lastName:
        description: User last name
        type: string
      oauthSignature:
        description: The signature made by the OAuth service on top of the user email
        type: string
      provider:
        description: OAuth provider name (google, github, facebook)
        type: string
      userOAuthSignature:
        description: The signature made by the user on on top of the oauth signature
        type: string
    type: object
  apicommon.OAuthLoginResponse:
    properties:
      expirity:
        description: Token expiration time
        type: string
      registered:
        description: Whether the user had to be  registered
        type: boolean
      token:
        description: JWT authentication token
        type: string
    type: object
  apicommon.OrgMember:
    properties:
      birthDate:
        description: Member's date of birth in format YYYY-MM-DD
        type: string
      email:
        description: Member's email address
        type: string
      id:
        description: Member's internal unique internal ID
        type: string
      memberNumber:
        description: Unique member number as defined by the organization
        type: string
      name:
        description: Member's name
        type: string
      nationalId:
        description: Member's National ID No
        type: string
      other:
        additionalProperties: {}
        description: Additional custom fields
        type: object
      password:
        description: Member's password (for authentication)
        type: string
      phone:
        description: Member's phone number
        type: string
      surname:
        description: Member's surname
        type: string
      weight:
        description: Member's census weight
        type: string
    type: object
  apicommon.OrganizationAddMetaRequest:
    properties:
      meta:
        additionalProperties: {}
        description: Set of key-value pairs to add or update in the organization's
          meta information
        type: object
    type: object
  apicommon.OrganizationAddresses:
    properties:
      addresses:
        description: List of organization blockchain addresses
        items:
          items:
            type: integer
          type: array
        type: array
    type: object
  apicommon.OrganizationBundle:
    properties:
      bundleId:
        description: The ID of the bundle
        type: string
      primaryProcessId:
        description: |-
          The ID of the primary process which identifies the set of processes in
          the bundle, no matter how many (one or more)
        type: string
      processes:
        description: The list of processes IDs in the bundle
        items:
          type: string
        type: array
    type: object
  apicommon.OrganizationCensus:
    properties:
      authFields:
        description: Optional for defining which member data should be used for authentication
        items:
          $ref: '#/definitions/db.OrgMemberAuthField'
        type: array
      censusId:
        description: Unique identifier for the census
        type: string
      groupID:
        description: Optional for creating a census based on an organization member
          group
        type: string
      orgAddress:
        description: Organization address
        items:
          type: integer
        type: array
      size:
        description: Size of the census
        type: integer
      twoFaFields:
        description: Optional for defining which member data should be used for two-factor
          authentication
        items:
          $ref: '#/definitions/db.OrgMemberTwoFaField'
        type: array
      type:
        allOf:
        - $ref: '#/definitions/db.CensusType'
        description: Type of census
      weighted:
        description: Weighted indicates if the census uses weighted voting
        type: boolean
    type: object
  apicommon.OrganizationCensuses:
    properties:
      censuses:
        description: List of organization censuses
        items:
          $ref: '#/definitions/apicommon.OrganizationCensus'
        type: array
    type: object
  apicommon.OrganizationDeleteMetaRequest:
    properties:
      keys:
        description: List of keys to delete from the organization's meta information
        items:
          type: string
        type: array
    type: object
  apicommon.OrganizationInfo:
    properties:
      active:
        description: Whether the organization is active
        type: boolean
      address:
        description: The organization's blockchain address
        items:
          type: integer
        type: array
      color:
        description: The organization's brand color in hex format
        type: string
      communications:
        description: Whether the organization has enabled communications
        type: boolean
      counters:
        allOf:
        - $ref: '#/definitions/apicommon.SubscriptionUsage'
        description: Usage counters for the organization
      country:
        description: The country where the organization is based
        type: string
      createdAt:
        description: Creation timestamp in RFC3339 format
        type: string
      description:
        allOf:
        - $ref: '#/definitions/apicommon.MultilingualText'
        description: Description is a shorthand for meta["description"]. Same encoding
          rules as Name.
      integrator:
        description: |-
          Whether to subscribe the new organization to the free integrator plan at
          creation time (opt-in). Used by the integrator portal so a newly created org
          becomes an integrator on the free tier with no checkout. Default false uses
          the regular default plan.
        type: boolean
      logo:
        allOf:
        - $ref: '#/definitions/apicommon.MultilingualText'
        description: Logo is a shorthand for meta["logo"]. Same encoding rules as
          Name.
      managedBy:
        description: |-
          Integrator organization that manages this org, when it was created through
          the integrator portal. Nil for regular organizations. Lets clients tell
          managed orgs apart from the user's own orgs (e.g. to hide them from the org
          switcher), a distinction Parent does not capture (managed orgs set ManagedBy,
          not Parent).

          A pointer so it is omitted rather than emitted as the zero address: json's
          omitempty does not skip the fixed-size common.Address array.
        example: deadbeef
        format: hex
        type: string
      meta:
        additionalProperties: {}
