        type: string
      tokenR:
        example: deadbeef
        format: hex
        type: string
    type: object
  handlers.UserWeightRequest:
    properties:
      authToken:
        example: deadbeef
        format: hex
        type: string
    type: object
  handlers.UserWeightResponse:
    properties:
      weight:
        example: 2a
        format: hex
        type: string
