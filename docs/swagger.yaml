      emailReminder:
        type: boolean
      liveResults:
        type: boolean
      liveStreaming:
        type: boolean
      overwrite:
        type: boolean
      personalization:
        type: boolean
      phoneSupport:
        type: boolean
      whiteLabel:
        type: boolean
    type: object
  db.IntegratorLimits:
    properties:
      maxManagedOrgs:
        type: integer
    type: object
  db.JobResult:
    properties:
      address:
        example: deadbeef
        type: string
      status:
        type: string
      voteID:
        example: deadbeef
        type: string
    type: object
  db.JobStatus:
    enum:
    - pending
    - completed
    - failed
    type: string
    x-enum-varnames:
    - JobStatusPending
    - JobStatusCompleted
    - JobStatusFailed
  db.JobType:
    enum:
    - org_members
    - census_participants
    - publish_process
    - set_process_status
    - relay_vote
    - publish_voting_process
    type: string
    x-enum-varnames:
    - JobTypeOrgMembers
    - JobTypeCensusParticipants
    - JobTypePublishProcess
    - JobTypeSetProcessStatus
    - JobTypeRelayVote
    - JobTypePublishVotingProcess
  db.MultiLangString:
    additionalProperties:
      type: string
    type: object
  db.OrgMemberAuthField:
    enum:
    - name
    - surname
    - memberNumber
    - nationalId
    - birthDate
    type: string
    x-enum-varnames:
    - OrgMemberAuthFieldsName
    - OrgMemberAuthFieldsSurname
    - OrgMemberAuthFieldsMemberNumber
    - OrgMemberAuthFieldsNationalID
    - OrgMemberAuthFieldsBirthDate
  db.OrgMemberTwoFaField:
    enum:
    - email
    - phone
    type: string
    x-enum-varnames:
    - OrgMemberTwoFaFieldEmail
    - OrgMemberTwoFaFieldPhone
  db.Plan:
    properties:
      default:
        type: boolean
      features:
        $ref: '#/definitions/db.Features'
      freeTrialDays:
        type: integer
      id:
        type: string
      integratorLimits:
        $ref: '#/definitions/db.IntegratorLimits'
      monthlyPrice:
        type: integer
      name:
        type: string
      organization:
        $ref: '#/definitions/db.PlanLimits'
      public:
        description: |-
          Public reports whether the plan is listed on the public /plans catalog. Private plans
          (custom per-customer contracts and the internal free integrator tier) are hidden from
          the listing but remain visible to their own subscriber via the subscription payload.
        type: boolean
      stripeMonthlyPriceID:
        type: string
      stripeYearlyPriceID:
        type: string
      votingTypes:
        $ref: '#/definitions/db.VotingTypes'
      yearlyPrice:
        type: integer
    type: object
  db.PlanLimits:
    properties:
      customPlan:
        type: boolean
      customURL:
        type: boolean
      drafts:
        type: integer
      maxCensus:
        type: integer
      maxDaysDuration:
        description: Max process duration in days
        type: integer
      maxProcesses:
        type: integer
      maxVotes:
        description: |-
          Max votes that may be relayed; 0 means unlimited. For managed orgs this is the
          integrator's shared pool, summed across all its managed orgs.
        type: integer
      subOrgs:
        type: integer
      teamMembers:
        type: integer
    type: object
  db.Process:
    properties:
      address:
        example: deadbeef
        format: hex
        type: string
      census:
        $ref: '#/definitions/db.Census'
      electionParams:
        $ref: '#/definitions/db.ElectionParams'
      encryptionKeys:
        description: |-
          EncryptionKeys holds the on-chain encryption public keys of an encrypted
          (secretUntilTheEnd) election. They are resolved lazily on read and cached here once
          the keykeepers have published them (immutable thereafter). Unset/omitted for
          non-encrypted elections and for encrypted ones whose keys are not yet published.
        items:
          $ref: '#/definitions/db.EncryptionKey'
        type: array
      id:
        type: string
      metadata:
        additionalProperties: {}
        type: object
      metadataURL:
        description: |-
          MetadataURL is the generic reference to this process's canonical ElectionMetadata
          document. http(s) references are fetched — locally when they point at this service's
          object storage (including a relative "/storage/{name}" reference), otherwise via an
          external request; ipfs references are resolved via the Vochain and then cached
          locally. Bootstrapped from the on-chain pointer on first read when unset. Unset for
          unpublished drafts, and omitted from JSON in that case (omitempty).
        type: string
      orgAdress:
        items:
          type: integer
        type: array
      publishedAt:
        type: string
      status:
        type: string
    type: object
  db.PublishedCensus:
    properties:
      createdAt:
        type: string
      root:
        items:
          type: integer
        type: array
      uri:
        type: string
    type: object
  db.Question:
    properties:
      choices:
        items:
          $ref: '#/definitions/db.Choice'
        type: array
      description:
        $ref: '#/definitions/db.MultiLangString'
      title:
        $ref: '#/definitions/db.MultiLangString'
    type: object
  db.QuestionTypeSetup:
    properties:
      maxChoices:
        type: integer
      minChoices:
        type: integer
      uniqueChoices:
        type: boolean
    type: object
  db.UserRole:
    enum:
    - admin
    - manager
    - viewer
    type: string
    x-enum-varnames:
    - AdminRole
    - ManagerRole
    - ViewerRole
  db.VoteType:
    properties:
      costExponent:
        type: integer
      costFromWeight:
        type: boolean
      maxCount:
        type: integer
      maxTotalCost:
        description: |-
          MaxTotalCost bounds the sum of value^costExponent across a ballot's fields
          (0 = no limit). Used by multichoice/approval to cap the number of selections.
        type: integer
      maxValue:
        type: integer
      maxVoteOverwrites:
        type: integer
      uniqueChoices:
        type: boolean
    type: object
  db.VotingProcessQuestion:
    properties:
      ballotProtocol:
        $ref: '#/definitions/db.BallotProtocol'
      choices:
        items:
          $ref: '#/definitions/db.Choice'
        type: array
      description:
        $ref: '#/definitions/db.MultiLangString'
      eligibleMemberIds:
        items:
          type: string
        type: array
      id:
        type: string
      metadata:
        additionalProperties: {}
        type: object
      parentProcessId:
        type: string
      secretUntilTheEnd:
        type: boolean
      status:
        type: string
      title:
        $ref: '#/definitions/db.MultiLangString'
      type:
        type: string
      typeSetup:
        $ref: '#/definitions/db.QuestionTypeSetup'
      upstreamId:
        example: deadbeef
        format: hex
        type: string
    type: object
  db.VotingTypes:
    properties:
      approval:
        type: boolean
      cumulative:
        type: boolean
      multiple:
        type: boolean
      ranked:
        type: boolean
      single:
        type: boolean
      weighted:
        type: boolean
    type: object
  errors.Error:
    properties:
      code:
        description: Error code
        type: integer
      data:
        description: Optional data to include in the error response
      error:
        description: Original error
      httpstatus:
        description: HTTP status code to return
        type: integer
      logLevel:
        description: Log level for this error (defaults to "debug")
        type: string
    type: object
  github_com_vocdoni_saas-backend_stripe.CheckoutSessionStatus:
    properties:
      customer_email:
        type: string
      status:
        type: string
      subscription_status:
        type: string
    type: object
  handlers.AuthRequest:
    properties:
      birthDate:
        type: string
      email:
        type: string
      memberNumber:
        type: string
      name:
        type: string
      nationalId:
        type: string
      phone:
        type: string
      surname:
        type: string
    type: object
  handlers.AuthResendRequest:
    properties:
      authToken:
        example: deadbeef
        format: hex
        type: string
      email:
        type: string
      phone:
        type: string
    type: object
  handlers.AuthResponse:
    properties:
      authToken:
        example: deadbeef
        format: hex
        type: string
      signature:
        example: deadbeef
        format: hex
        type: string
      weight:
        example: 2a
        format: hex
        type: string
    type: object
  handlers.CheckMembershipRequest:
    properties:
      authToken:
        example: deadbeef
        format: hex
        type: string
      electionId:
        example: deadbeef
        format: hex
        type: string
    type: object
  handlers.CheckMembershipResponse:
    properties:
      belongs:
        type: boolean
      hasVoted:
        type: boolean
      weight:
        example: 2a
        format: hex
        type: string
    type: object
  handlers.ConsumedAddressRequest:
    properties:
      authToken:
        example: deadbeef
        format: hex
        type: string
    type: object
  handlers.ConsumedAddressResponse:
    properties:
      address:
        example: deadbeef
        format: hex
        type: string
      at:
        type: string
      nullifier:
        example: deadbeef
        format: hex
        type: string
    type: object
  handlers.SignRequest:
    properties:
      authToken:
        example: deadbeef
        format: hex
        type: string
      electionId:
        example: deadbeef
        format: hex
