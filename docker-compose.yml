name: saas-backend

services:
  api:
    platform: linux/amd64
    env_file:
      - .env
    environment:
      - VOCDONI_MONGOURL=mongodb://root:vocdoni@mongo:27017/saasdb
    build:
      context: ./
      dockerfile: dev.dockerfile
      target: api
    image: saas-backend-api

    ports:
      - ${VOCDONI_PORT}:${VOCDONI_PORT}
    sysctls:
      net.core.somaxconn: 8128
    restart: ${RESTART:-unless-stopped}
    depends_on:
      - mongo
  mongo:
    image: mongo
    restart: ${RESTART:-unless-stopped}
    ports:
      - 27017:27017
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=vocdoni
      - MONGO_INITDB_DATABASE=saasdb
    volumes:
      - mongodb:/data/mongodb

  mongo-express:
    image: mongo-express
    restart: ${RESTART:-unless-stopped}
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: vocdoni
      ME_CONFIG_MONGODB_URL: mongodb://root:vocdoni@mongo:27017/

  ui:
    profiles:
      - with-ui
    env_file:
      - .env
    build:
      context: .
      dockerfile: ui.dev.dockerfile
      args:
        VOCDONI_APP_REF: ${VOCDONI_APP_REF:-develop}
    image: saas-backend-ui
    ports:
      - ${UI_PORT:-3000}:${UI_PORT:-3000}
    environment:
      VOCDONI_ENVIRONMENT: dev
      SAAS_URL: http://localhost:${VOCDONI_PORT:-8080}
    depends_on:
      - api

  defaultplan:
    platform: linux/amd64
    profiles:
      - with-ui
    build:
      context: ./
      dockerfile: dev.dockerfile
      target: defaultplan
    image: saas-backend-defaultplan
    env_file:
      - .env
    environment:
      - VOCDONI_MONGOURL=mongodb://root:vocdoni@mongo:27017/saasdb
    depends_on:
      - mongo

  fakesmtp:
    profiles:
      - local-smtp
    network_mode: "service:api"
    build:
      context: ./
      dockerfile: dev.dockerfile
      target: localsmtp
    image: saas-backend-localsmtp
    env_file:
      - .env
    environment:
      VOCDONI_SMTPSERVER: 0.0.0.0
    depends_on:
      - api

  vocone:
    platform: linux/amd64
    profiles:
      - with-vocone
    image: ghcr.io/vocdoni/vocdoni-node:${IMAGE_TAG:-main}
    entrypoint: /app/voconed
    environment:
      VOCONED_DIR: /app/run
      VOCONED_PORT: 9090
      VOCONED_URLPATH: /v2
      VOCONED_BLOCKPERIOD: 5
      VOCONED_BLOCKSIZE: 2000
      VOCONED_LOGLEVEL: debug
      VOCONED_ENABLEFAUCETWITHAMOUNT: 1000
      VOCONED_CHAINID: dev
      VOCONED_TXCOSTS: 2
      VOCONED_SETTXCOSTS: true
    volumes:
      - vocone_run:/app/run
    ports:
      - 9090:9090
    sysctls:
      net.core.somaxconn: 8128
    restart: ${RESTART:-unless-stopped}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${VOCONED_PORT:-9090}/${VOCONED_URLPATH:-v2}/chain/info"]
      interval: 3s
      retries: 10
      start_period: 15s

  fundaccount:
    profiles:
      - with-vocone
    network_mode: "service:vocone"
    build:
      context: ./
      dockerfile: dev.dockerfile
      target: fundaccount
    image: saas-backend-fundaccount
    env_file:
      - .env
    depends_on:
      vocone:
        condition: service_healthy

volumes:
  mongodb: {}
  vocone_run: {}
