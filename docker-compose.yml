name: saas-backend

services:
  api:
    platform: linux/amd64
    env_file:
      - .env
    environment:
      - VOCDONI_MONGOURL=mongodb://root:vocdoni@mongo:27017/saasdb
    build:
      context: ./
    ports:
      - ${VOCDONI_PORT}:${VOCDONI_PORT}
    sysctls:
      net.core.somaxconn: 8128
    restart: ${RESTART:-unless-stopped}
    volumes:
      - ./backend:/app/backend
      - /home/user/go/pkg/mod/github.com/wasmerio/:/home/user/go/pkg/mod/github.com/wasmerio/
      - /tmp/.vochain-zkCircuits/:/root/.cache/vocdoni/zkCircuits/
    depends_on:
      - mongo

  mongo:
    image: mongo
    restart: ${RESTART:-unless-stopped}
    ports:
      - 27017:27017
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=vocdoni
      - MONGO_INITDB_DATABASE=saasdb

    volumes:
      - mongodb:/data/mongodb

  mongo-express:
    image: mongo-express
    restart: ${RESTART:-unless-stopped}
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: vocdoni
      ME_CONFIG_MONGODB_URL: mongodb://root:vocdoni@mongo:27017/

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: true
      MP_SMTP_TLS_CERT: sans:mailpit
      MP_SMTP_TLS_KEY: sans:mailpit
      MP_VERBOSE: true

volumes:
  mongodb: {}



