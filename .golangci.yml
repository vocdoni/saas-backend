version: "2"
linters:
  enable:
    - goconst
    - lll
    - misspell
    - revive
  settings:
    lll:
      line-length: 130
    revive:
      enable-all-rules: true
      rules:
      - name: exported # TODO: fix all issues and re-enable this rule
        disabled: true
      - name: use-errors-new # TODO: fix all issues and re-enable this rule
        disabled: true
      - name: add-constant # TODO: fix all issues and re-enable this rule
        disabled: true
      - name: line-length-limit # lll is already run by golangci-lint
        disabled: true
      - name: function-length
        exclude: ["**/*_test.go"]
      - name: cognitive-complexity
        exclude: ["**/*_test.go"]
      - name: cyclomatic
        exclude: ["**/*_test.go"]
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-same-issues: 0
formatters:
  enable:
    - gofumpt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
