version: "2"
linters:
  enable:
    - goconst
    - lll
    - misspell
    - revive
  settings:
    goconst:
      ignore-tests: true # repeated literals in test fixtures are fine
      ignore-string-values:
        # single-token strings are overwhelmingly bson field names, mongo query
        # operators ($set, $exists...) and schema keys; consting them adds churn
        - '^[\w.$-]+$'
    lll:
      line-length: 130
    revive:
      enable-all-rules: true
      rules:
      - name: line-length-limit # lll is already run by golangci-lint
        disabled: true
      - name: unnecessary-format # we prefer fmt.Errorf rather than errors.New
        disabled: true
      - name: unhandled-error # ignore errors from stdout printing and in-memory writers (which never fail)
        arguments:
          - "fmt\\.Print(f|ln)?"
          - "fmt\\.Fprint(f|ln)?"
          - "strings\\.Builder\\.WriteString"
          - "bytes\\.Buffer\\.Write"
      - name: package-naming # the errors package intentionally mirrors the stdlib name
        exclude: ["**/errors/*.go"]
      - name: function-length # test funcs are usually long and complex, and that's ok
        exclude: ["**/*_test.go"]
      - name: cognitive-complexity # test funcs are usually long and complex, and that's ok
        exclude: ["**/*_test.go"]
      - name: cyclomatic # test funcs are usually long and complex, and that's ok
        exclude: ["**/*_test.go"]
        # Disable some rules until fixing the issues in current codebase
      - name: exported # TODO: fix all issues and re-enable this rule
        disabled: true
      - name: use-errors-new # TODO: fix all issues and re-enable this rule
        disabled: true
      - name: add-constant # TODO: fix all issues and re-enable this rule
        disabled: true
      - name: cyclomatic # TODO: fix all issues and re-enable this rule
        disabled: true
      - name: cognitive-complexity # TODO: fix all issues and re-enable this rule
        disabled: true
      - name: function-length # TODO: fix all issues and re-enable this rule
        disabled: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-same-issues: 0
formatters:
  enable:
    - gofumpt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
