name: Main

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: read # allow read access to pull requests. Needed for golangci-lint `only-new-issues` option.

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          only-new-issues: true
      - name: Check qt testing patterns
        run: ./scripts/check-qt-patterns.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Tidy go module
        run: |
          go mod tidy
          if [[ $(git status --porcelain) ]]; then
            git diff
            echo
            echo "go mod tidy made these changes, please run 'go mod tidy' and include those changes in a commit"
            exit 1
          fi
      - name: Run Go test
        run: go test -v -failfast -timeout=30m ./...
                -cover -coverpkg=./... -covermode=count -coverprofile=gocoverage.txt
      - name: Run Go test -race # note that -race can easily make the crypto stuff 10x slower
        if: github.ref == 'refs/heads/stage' ||  startsWith(github.ref, 'refs/heads/release')
        run: go test -vet=off -failfast -timeout=30m -race ./...
                -cover -coverpkg=./... -covermode=atomic -coverprofile=gocoverage.txt

      - uses: benjlevesque/short-sha@v3.0 # sets env.SHA to the first 7 chars of github.sha
      - name: Store code coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: gocoverage@${{ env.SHA }}.txt
          path: gocoverage.txt

  docker-release:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stage' ||  startsWith(github.ref, 'refs/heads/release') ||  startsWith(github.ref, 'refs/heads/aragon')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Get short commit sha and branch name
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "branch_name=$(echo ${GITHUB_REF#refs/heads/} | tr '/' '-' )" >> $GITHUB_OUTPUT
      - name: Get Go version from go.mod
        id: goversion
        run: |
          set -euo pipefail
          version=$(awk '/^go [0-9]/ { print $2; exit }' go.mod)
          if [ -z "$version" ]; then
            echo "::error::could not determine Go version from go.mod"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Push to Docker Hub and ghcr.io
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            GOLANG_VERSION=${{ steps.goversion.outputs.version }}
          platforms: linux/amd64
          push: true
          tags: |
            vocdoni/${{ github.event.repository.name }}:latest, vocdoni/${{ github.event.repository.name }}:${{ steps.vars.outputs.branch_name }},
            ghcr.io/vocdoni/${{ github.event.repository.name }}:latest, ghcr.io/vocdoni/${{ github.event.repository.name }}:${{ steps.vars.outputs.branch_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    needs: [test]
    continue-on-error: true # never mark the whole CI as failed because of this job
    permissions:
      contents: read
      actions: read # download the baseline breakdown artifact from main runs
      pull-requests: write # post the coverage report as a PR comment
    steps:
      - uses: actions/checkout@v5
      - uses: benjlevesque/short-sha@v3.0 # sets env.SHA to the first 7 chars of github.sha
      - uses: actions/download-artifact@v4
        with:
          name: gocoverage@${{ env.SHA }}.txt
      - name: Download coverage baseline from main
        id: baseline
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@v6
        with:
          branch: main
          event: push
          workflow_conclusion: success
          name: main.breakdown
          if_no_artifact_found: warn
      - name: Check test coverage
        id: coverage
        uses: vladopajic/go-test-coverage@v2
        with:
          profile: gocoverage.txt
          # on main pushes, save the breakdown that PRs will diff against
          breakdown-file-name: ${{ github.ref_name == 'main' && 'main.breakdown' || '' }}
          # on PRs, diff against the latest main baseline (if one exists yet)
          diff-base-breakdown-file-name: >-
            ${{ github.event_name == 'pull_request' && steps.baseline.outputs.found_artifact == 'true' && 'main.breakdown' || '' }}
      - name: Upload coverage baseline
        if: github.ref_name == 'main'
        uses: actions/upload-artifact@v4
        with:
          name: main.breakdown
          path: main.breakdown
          if-no-files-found: error
      - name: Post coverage report on the PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: go-coverage
          message: |
            ## 🧪 Coverage report

            Total coverage: **${{ steps.coverage.outputs.total-coverage }}%**

            ```
            ${{ fromJSON(steps.coverage.outputs.report) }}
            ```
