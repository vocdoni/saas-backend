name: Main

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: read # allow read access to pull requests. Needed for golangci-lint `only-new-issues` option.

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          only-new-issues: true
      - name: Check qt testing patterns
        run: ./scripts/check-qt-patterns.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Tidy go module
        run: |
          go mod tidy
          if [[ $(git status --porcelain) ]]; then
            git diff
            echo
            echo "go mod tidy made these changes, please run 'go mod tidy' and include those changes in a commit"
            exit 1
          fi
      - name: Run Go test
        run: go test -v -failfast -timeout=30m ./...
                -cover -coverpkg=./... -covermode=count -coverprofile=gocoverage.txt
      - name: Run Go test -race # note that -race can easily make the crypto stuff 10x slower
        if: github.ref == 'refs/heads/stage' ||  startsWith(github.ref, 'refs/heads/release')
        run: go test -vet=off -failfast -timeout=30m -race ./...
                -cover -coverpkg=./... -covermode=atomic -coverprofile=gocoverage.txt

      - name: Store code coverage artifact
        # fixed name: pushes to main become the baseline PRs are compared against
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: gocoverage.txt

  docker-release:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stage' ||  startsWith(github.ref, 'refs/heads/release') ||  startsWith(github.ref, 'refs/heads/aragon')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Get short commit sha and branch name
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "branch_name=$(echo ${GITHUB_REF#refs/heads/} | tr '/' '-' )" >> $GITHUB_OUTPUT
      - name: Get Go version from go.mod
        id: goversion
        run: |
          set -euo pipefail
          version=$(awk '/^go [0-9]/ { print $2; exit }' go.mod)
          if [ -z "$version" ]; then
            echo "::error::could not determine Go version from go.mod"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Push to Docker Hub and ghcr.io
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            GOLANG_VERSION=${{ steps.goversion.outputs.version }}
          platforms: linux/amd64
          push: true
          tags: |
            vocdoni/${{ github.event.repository.name }}:latest, vocdoni/${{ github.event.repository.name }}:${{ steps.vars.outputs.branch_name }},
            ghcr.io/vocdoni/${{ github.event.repository.name }}:latest, ghcr.io/vocdoni/${{ github.event.repository.name }}:${{ steps.vars.outputs.branch_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    needs: [test]
    # only on PRs: pushes to main just upload the code-coverage artifact
    # (in the test job) which becomes the baseline PRs are compared against
    if: github.event_name == 'pull_request'
    continue-on-error: true # never mark the whole CI as failed because of this job
    permissions:
      contents: read
      actions: read # download coverage artifacts (current PR run + main baseline)
      pull-requests: write # post the coverage report as a PR comment
    steps:
      - name: Generate per-package coverage diff report
        id: coverage
        uses: fgrosse/go-coverage-report@v1.3.1
        with:
          coverage-artifact-name: code-coverage
          coverage-file-name: gocoverage.txt
          # the action skips commenting when no Go files changed; post the
          # comment ourselves so the PR always gets feedback
          skip-comment: true
      - name: Post coverage report on the PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: go-coverage
          message: ${{ steps.coverage.outputs.coverage_report || '✅ No coverage changes detected in this PR.' }}
